services:
  redis:
    image: "redis:8.6.2"
    command: redis-server --save 60 1
  backend:
    build: example-backend/
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=ryoko
      - POSTGRES_PASSWORD=zxcvbnm
      - POSTGRES_DATABASE=test
  frontend:
    build: example-frontend/
  postgres:
    image: 'postgres:latest'
    environment:
      - POSTGRES_USER=ryoko
      - POSTGRES_PASSWORD=zxcvbnm
      - POSTGRES_DB=test
    volumes:
      - ./testim:/var/lib/postgresql
  nginx:
    image: 'nginx:latest'
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

